# Toron — environnement local (DoD M0 : « l'app tourne en Docker local »).
# Usage : docker compose -f infra/compose.yaml up --build
# Les identifiants ci-dessous sont locaux uniquement — jamais utilisés hors poste dev.

services:
  db:
    image: postgres:16.14-alpine3.23
    environment:
      POSTGRES_DB: toron
      POSTGRES_USER: toron_local
      POSTGRES_PASSWORD: toron_local_dev_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toron_local -d toron"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      DATABASE_URL_APP: postgres://toron_app_login:toron_app_dev_only@db:5432/toron
      DATABASE_URL_AUTH: postgres://toron_auth_login:toron_auth_dev_only@db:5432/toron
      # Secret de dev local uniquement — généré aléatoirement par
      # environnement réel via le gestionnaire de secrets (S3).
      BETTER_AUTH_SECRET: dev_local_secret_32_caracteres_min_x
      BETTER_AUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
