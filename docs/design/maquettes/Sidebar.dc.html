<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<aside style="width:100%;height:100%;background:var(--srf);border-right:1px solid var(--bd);display:flex;flex-direction:column;min-height:0;font-family:'IBM Plex Sans',sans-serif;color:var(--tx)">
  <div style="height:52px;flex-shrink:0;display:flex;align-items:center;gap:9px;padding:0 16px;border-bottom:1px solid var(--bd)">
    <svg viewBox="0 0 24 24" width="22" height="22" style="color:var(--tx);flex-shrink:0"><rect x="4" y="4.4" width="16" height="3.2" rx="1.6" fill="currentColor"></rect><rect x="4" y="10.4" width="16" height="3.2" rx="1.6" fill="currentColor"></rect><rect x="4" y="16.4" width="16" height="3.2" rx="1.6" fill="currentColor"></rect><rect x="7.6" y="1.4" width="2.8" height="21.2" rx="1.4" fill="var(--ac)"></rect><rect x="7.6" y="10.4" width="2.8" height="3.2" fill="currentColor"></rect></svg>
    <span style="font-weight:600;font-size:13.5px;letter-spacing:.13em">TORON</span>
  </div>
  <nav style="flex:1;min-height:0;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:2px">
    <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="3">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--tx2);padding:{{ sec.pad }}">{{ sec.label }}</div>
      <sc-for list="{{ sec.items }}" as="it" hint-placeholder-count="4">
        <div style="position:relative;display:flex;align-items:center;gap:9px;height:30px;padding:0 9px;border-radius:6px;cursor:pointer;background:{{ it.bg }};color:{{ it.color }};font-weight:{{ it.weight }};font-size:12.5px" style-hover="background:var(--srf2)">
          <span style="position:absolute;left:0;top:7px;bottom:7px;width:2px;border-radius:1px;background:{{ it.bar }}"></span>
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="{{ it.icon }}"></path></svg>
          {{ it.label }}
          <sc-if value="{{ it.hasCount }}" hint-placeholder-val="{{ false }}">
            <span style="margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:{{ it.countColor }}">{{ it.count }}</span>
          </sc-if>
        </div>
      </sc-for>
    </sc-for>
  </nav>
  <div style="flex-shrink:0;border-top:1px solid var(--bd);padding:10px;display:flex;flex-direction:column;gap:2px">
    <div style="display:flex;align-items:center;gap:9px;padding:8px 9px 4px">
      <div style="width:26px;height:26px;flex-shrink:0;border-radius:6px;background:var(--srf2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;color:var(--tx)">CM</div>
      <div style="min-width:0">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Claire Morel</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.08em;color:var(--tx2);margin-top:1px">RSSI · NEXIALIS SAS</div>
      </div>
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.09em;color:var(--tx2);opacity:.75;padding:4px 9px 2px">DONNÉES HÉBERGÉES EN UE · SECNUMCLOUD</div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:236,&quot;height&quot;:760},&quot;active&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;,&quot;default&quot;:&quot;risques&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const active = this.props.active ?? 'dashboard';
    const defs = [
      { label:'PILOTAGE', pad:'2px 9px 6px', items:[
        ['dashboard','Tableau de bord','M4 4.5h5.5v5.5H4z M14.5 4.5H20v5.5h-5.5z M4 14.5h5.5V20H4z M14.5 14.5H20V20h-5.5z'],
        ['revue','Revue de direction','M4.5 6.5h15v13h-15z M4.5 10.5h15 M8.5 4v4 M15.5 4v4']
      ]},
      { label:'CONFORMITÉ', pad:'14px 9px 6px', items:[
        ['referentiels','Référentiels','M4 6.5h16 M4 12h16 M4 17.5h16'],
        ['controles','Contrôles','M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16z M8.6 12.2l2.4 2.4 4.6-5'],
        ['plan','Écarts & plan d\u2019action','M12 4.4 20.4 19H3.6Z M12 10v4 M12 16.4v.2', 23],
        ['preuves','Preuves','M6.5 4h11v16h-11z M9.5 8.5h5 M9.5 12h5 M9.5 15.5h3'],
        ['documents','Documents','M7 3.5h6.5L18 8v12.5H7z M13.5 3.5V8H18 M9.5 12.5h6 M9.5 15.5h6'],
        ['audits','Audits','M9 5.5h6 M7 6.5h10v13H7z M9.5 12.5l1.8 1.8 3.5-3.8']
      ]},
      { label:'QUALITÉ · QMS', pad:'14px 9px 6px', items:[
        ['processus','Processus','M6 4.5h4v4H6z M14 15.5h4v4h-4z M8 8.5v3a3 3 0 0 0 3 3h3'],
        ['nc','Non-conformités','M8.5 3.5h7L20.5 8.5v7L15.5 20.5h-7L3.5 15.5v-7z M9.7 9.7l4.6 4.6 M14.3 9.7l-4.6 4.6', 3]
      ]},
      { label:'OPÉRATIONS', pad:'14px 9px 6px', items:[
        ['risques','Risques · EBIOS RM','M12 3.6 20.4 12 12 20.4 3.6 12Z'],
        ['incidents','Incidents','M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16z M12 8v4.6 M12 15.8v.2', 2],
        ['fournisseurs','Fournisseurs','M4 8.5 12 4.5l8 4v8l-8 4-8-4z M4 8.5l8 4 8-4 M12 12.5v8'],
        ['livrables','Livrables','M4.5 14v4.2c0 .8.6 1.4 1.4 1.4h12.2c.8 0 1.4-.6 1.4-1.4V14 M12 4v9 M8.8 9.8 12 13 15.2 9.8']
      ]},
      { label:'SYSTÈME', pad:'14px 9px 6px', items:[
        ['parametres','Paramètres','M4 8h9 M17 8h3 M4 16h3 M11 16h9 M14 6.5v3 M9 14.5v3']
      ]}
    ];
    const sections = defs.map(sec => ({
      label: sec.label, pad: sec.pad,
      items: sec.items.map(it => {
        const on = it[0] === active;
        return {
          label: it[1], icon: it[2],
          hasCount: it.length > 3, count: it[3],
          countColor: on ? 'var(--ac)' : 'var(--tx2)',
          bg: on ? 'var(--srf2)' : 'transparent',
          bar: on ? 'var(--ac)' : 'transparent',
          color: on ? 'var(--tx)' : 'var(--tx2)',
          weight: on ? '500' : '400'
        };
      })
    }));
    return { sections };
  }
}
</script>
</body>
</html>
